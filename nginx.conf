##############################################################
#  Nginx konfiguratsiyasi — Shajara loyihasi
#  Joylashuv: /etc/nginx/sites-available/shajara
#  Yoqish: sudo ln -s /etc/nginx/sites-available/shajara /etc/nginx/sites-enabled/
#  SSL: sudo certbot --nginx -d shajara.uz -d www.shajara.uz
##############################################################

server {
    listen 80;
    server_name shajara.uz www.shajara.uz;

    # Certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS yo'naltirish
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name shajara.uz www.shajara.uz;

    # SSL sertifikatlari (certbot to'ldiradi)
    ssl_certificate     /etc/letsencrypt/live/shajara.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shajara.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Xavfsizlik headerlari
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header Referrer-Policy        "strict-origin"   always;

    client_max_body_size 20M;

    # ── Media fayllari (yuklangan rasmlar) ──────────────────────
    location /media/ {
        alias /var/www/shajara/backend/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Static fayllari (Django admin + whitenoise) ─────────────
    location /static/ {
        alias /var/www/shajara/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API va Admin (Django/Gunicorn) ───────────────────────────
    location ~ ^/(api|admin|__debug__)/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Frontend (React build — SPA) ─────────────────────────────
    location / {
        root  /var/www/shajara/frontend/dist;
        index index.html;
        # SPA uchun: barcha yo'llarni index.html ga yo'naltirish
        try_files $uri $uri/ /index.html;

        # HTML ni keshlamaslik
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        # JS/CSS/rasmlar — uzoq kesh
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
